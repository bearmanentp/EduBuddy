<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduBuddy - AI 진로 학습 도우미</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .chat-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
      height: 600px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      text-align: right;
    }

    .message-bubble {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 18px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user .message-bubble {
      background: #667eea;
      color: white;
    }

    .ai .message-bubble {
      background: white;
      color: #333;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: left;
    }

    .course-card {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .course-card h4 {
      color: #667eea;
      margin-bottom: 5px;
    }

    .course-card a {
      color: #5568d3;
      text-decoration: none;
      font-weight: bold;
    }

    .course-card a:hover {
      text-decoration: underline;
    }

    .setech-box {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .setech-box h4 {
      color: #856404;
      margin-bottom: 8px;
    }

    .chat-input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      padding: 12px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
      transition: border 0.3s;
    }

    #userInput:focus {
      border-color: #667eea;
    }

    #sendBtn {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #sendBtn:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-2px);
    }

    #sendBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: inline-block;
      padding: 12px 18px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .typing-indicator span {
      height: 8px;
      width: 8px;
      background: #667eea;
      border-radius: 50%;
      display: inline-block;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-10px);
      }
    }

    .example-questions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .example-btn {
      padding: 8px 15px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .example-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎓 EduBuddy</h1>
      <p class="subtitle">AI 기반 진로·학습 맞춤형 도우미</p>
    </header>

    <div class="example-questions">
      <button class="example-btn" onclick="sendExample('저는 AI와 프로그래밍에 관심있어요')">💻 AI/프로그래밍</button>
      <button class="example-btn" onclick="sendExample('의사가 되고 싶은데 어떤 공부를 해야하나요?')">⚕️ 의학 진로</button>
      <button class="example-btn" onclick="sendExample('경제학을 배우고 싶어요')">📊 경제학</button>
      <button class="example-btn" onclick="sendExample('디자인 관련 강좌 추천해주세요')">🎨 디자인</button>
    </div>

    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="message ai">
          <div class="message-bubble">
            안녕하세요! 👋<br>
            저는 당신의 학습과 진로를 돕는 <strong>EduBuddy</strong>입니다.<br><br>
            배우고 싶은 내용, 관심 진로, 또는 지금까지 공부한 내용을 말씀해주세요!<br>
            K-MOOC 강좌와 학점은행제 정보를 바탕으로 맞춤형 학습을 추천해드리고,<br>
            <strong>세부능력 및 특기사항(세특)</strong>도 작성해드립니다. 📝
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <input 
          type="text" 
          id="userInput" 
          placeholder="예: 저는 AI와 머신러닝을 배우고 싶어요..." 
          onkeypress="handleKeyPress(event)"
        >
        <button id="sendBtn" onclick="sendMessage()">전송</button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ 여기에 본인의 Google Apps Script URL 입력
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzt2ixzzegH5zTI6l8a_8rrtCMnhzS6k8d5MEJu-SO6IWsUS-wAwsXR5e5iVgT8rB91/exec';

    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    function sendExample(text) {
      userInput.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // 사용자 메시지 표시
      addMessage(message, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      // 타이핑 인디케이터 표시
      const typingId = addTypingIndicator();

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        removeTypingIndicator(typingId);

        if (data.status === 'success') {
          // AI 답변 표시
          let aiMessage = data.aiResponse;

          // K-MOOC 강좌 추가
          if (data.kmoocCourses && data.kmoocCourses.length > 0) {
            aiMessage += '\n\n<div style="margin-top: 15px;"><strong>📚 추천 K-MOOC 강좌:</strong></div>';
            data.kmoocCourses.forEach(course => {
              aiMessage += `
                <div class="course-card">
                  <h4>${course.name}</h4>
                  <p>👨‍🏫 ${course.professor} | 🏫 ${course.org_name}</p>
                  <p>📅 ${course.study_period}</p>
                  <a href="${course.url}" target="_blank">🔗 강좌 바로가기</a>
                </div>
              `;
            });
          }

          // 학점은행제 정보 추가
          if (data.creditBankInfo && data.creditBankInfo.length > 0) {
            aiMessage += '\n\n<div style="margin-top: 15px;"><strong>🎓 학점은행제 과목:</strong></div>';
            data.creditBankInfo.forEach(info => {
              aiMessage += `
                <div class="course-card">
                  <h4>${info.subject}</h4>
                  <p>🏢 ${info.organization}</p>
                </div>
              `;
            });
          }

          addMessage(aiMessage, 'ai');
        } else {
          addMessage('❌ 오류: ' + data.message, 'ai');
        }

      } catch (error) {
        removeTypingIndicator(typingId);
        addMessage(`❌ 오류가 발생했습니다: ${error.message}`, 'ai');
      } finally {
        sendBtn.disabled = false;
      }
    }

    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      messageDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addTypingIndicator() {
      const id = 'typing-' + Date.now();
      const typingDiv = document.createElement('div');
      typingDiv.id = id;
      typingDiv.className = 'message ai';
      typingDiv.innerHTML = `
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return id;
    }

    function removeTypingIndicator(id) {
      const element = document.getElementById(id);
      if (element) element.remove();
    }
  </script>
</body>
</html>
