<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>EduBuddy</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Segoe UI, Malgun Gothic, sans-serif;background:linear-gradient(135deg,#667eea 0%, #764ba2 100%);min-height:100vh;padding:15px;}
    .container{max-width:980px;margin:0 auto;}
    header{text-align:center;color:#fff;margin-bottom:14px;}
    h1{font-size:2.1rem;margin-bottom:4px;}
    .subtitle{opacity:.9;font-size:1rem;}
    .quick-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
    .quick-btn{padding:7px 14px;background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:18px;cursor:pointer;font-size:13px;transition:.2s;}
    .quick-btn:hover{background:rgba(255,255,255,0.35);transform:translateY(-2px);}
    .chat-box{background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.2);overflow:hidden;display:flex;flex-direction:column;height:640px;}
    .chat-header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
    .clear-btn{background:rgba(255,255,255,0.2);color:#fff;border:none;padding:6px 10px;border-radius:10px;cursor:pointer;font-size:12px;}
    .messages{flex:1;padding:15px;overflow-y:auto;background:#f5f7fa;}
    .msg{margin-bottom:12px;display:flex;animation:fadeIn .25s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .msg.user{justify-content:flex-end;}
    .msg.ai{justify-content:flex-start;}
    .bubble{max-width:85%;padding:12px 16px;border-radius:16px;line-height:1.6;word-break:break-word;font-size:14px;}
    .msg.user .bubble{background:#667eea;color:#fff;border-bottom-right-radius:4px;}
    .msg.ai .bubble{background:#fff;color:#333;box-shadow:0 2px 6px rgba(0,0,0,0.08);border-bottom-left-radius:4px;}
    .bubble h2,.bubble h3{color:#667eea;margin:10px 0 6px;font-size:0.98rem;}
    .bubble strong{color:#764ba2;}
    .bubble a{color:#5568d3;text-decoration:none;}
    .bubble a:hover{text-decoration:underline;}
    .course-card{background:linear-gradient(135deg,#f0f4ff,#e8eeff);border-left:4px solid #667eea;padding:10px 12px;margin:7px 0;border-radius:8px;}
    .course-card h4{color:#667eea;font-size:0.92rem;margin-bottom:3px;}
    .course-card .meta{color:#555;font-size:0.82rem;margin:2px 0;}
    .course-link{display:inline-block;margin-top:6px;background:#667eea;color:#fff !important;padding:6px 10px;border-radius:6px;text-decoration:none !important;font-size:0.85rem;font-weight:bold;}
    .credit-card{background:#f0fff4;border-left:4px solid #34a853;padding:10px 12px;margin:7px 0;border-radius:8px;}
    .credit-card h4{color:#34a853;font-size:0.92rem;margin-bottom:3px;}
    .credit-card .meta{color:#555;font-size:0.82rem;margin:2px 0;}
    .credit-link{display:inline-block;margin-top:6px;background:#34a853;color:#fff !important;padding:6px 10px;border-radius:6px;text-decoration:none !important;font-size:0.85rem;font-weight:bold;}
    .no-data{background:#fff3cd;border-left:4px solid #ffc107;padding:10px 12px;margin:8px 0;border-radius:8px;color:#856404;}
    .error-box{background:#f8d7da;border-left:4px solid #dc3545;padding:10px 12px;margin:8px 0;border-radius:8px;color:#721c24;}
    .image-box{margin:10px 0;border-radius:12px;overflow:hidden;border:1px solid #eaeaea;background:#fff;}
    .image-box img{width:100%;height:160px;object-fit:cover;display:block;}
    .image-caption{padding:8px 12px;font-size:12px;color:#666;}
    .input-area{padding:12px 14px;background:#fff;border-top:1px solid #e0e0e0;display:flex;flex-direction:column;gap:10px;}
    .top-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .file-label{padding:7px 12px;border:1px dashed #667eea;border-radius:14px;color:#667eea;font-size:12px;cursor:pointer;background:#f0f4ff;}
    #fileInput{display:none;}
    #fileName{font-size:12px;color:#666;}
    #imgToggle{padding:7px 12px;border:1px solid #ffc107;background:#fff3cd;border-radius:14px;cursor:pointer;font-size:12px;color:#856404;}
    #imgToggle.active{background:#ffc107;color:#fff;border-color:#ffc107;}
    .bottom-row{display:flex;gap:10px;align-items:center;}
    #msgInput{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:22px;font-size:14px;outline:none;}
    #msgInput:focus{border-color:#667eea;}
    #sendBtn{padding:10px 22px;border:none;border-radius:22px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;font-weight:bold;cursor:pointer;}
    #sendBtn:disabled{background:#ccc;cursor:wait;}
    .typing{display:inline-flex;gap:4px;padding:12px 18px;background:#fff;border-radius:16px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
    .typing span{width:7px;height:7px;background:#667eea;border-radius:50%;animation:bounce 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:.2s;}
    .typing span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-8px);}}
    @media (max-width: 600px){.chat-box{height:560px;} .bubble{max-width:92%;font-size:13px;}}
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🎓 EduBuddy</h1>
      <div class="subtitle">AI 진로·학습 맞춤 도우미</div>
    </header>

    <div class="quick-btns">
      <button class="quick-btn" onclick="ask('프로그래머가 되고 싶어요. 세특 추천해주세요.')">💻 AI/개발</button>
      <button class="quick-btn" onclick="ask('의사가 되고 싶어요. 세특도 도와주세요.')">⚕️ 의학</button>
      <button class="quick-btn" onclick="ask('경제학 관련 강의 추천해주세요.')">📊 경제학</button>
      <button class="quick-btn" onclick="ask('디자인 진로 상담해주세요.')">🎨 디자인</button>
      <button class="quick-btn" onclick="ask('심리학 세특 어떻게 써야 할까요?')">🧠 심리학</button>
      <button class="quick-btn" onclick="ask('데이터 분석가가 되려면 뭘 배워야 해요?')">📈 데이터</button>
    </div>

    <div class="chat-box">
      <div class="chat-header">
        <span>🤖 EduBuddy AI</span>
        <button class="clear-btn" onclick="clearChat()">대화 초기화</button>
      </div>

      <div class="messages" id="messages">
        <div class="msg ai">
          <div class="bubble">
            안녕하세요! 👋
            <br/>📝 세특 추천
            <br/>📚 강의 추천 + 링크
            <br/>🎓 학점은행제 추천
            <br/>📎 TXT/HWP 첨부 가능
            <br/>🖼️ 이미지 생성 프롬프트는 ON일 때 제공
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="top-row">
          <label class="file-label" for="fileInput">📎 파일 첨부(TXT/HWP)</label>
          <input type="file" id="fileInput" accept=".txt,.hwp,.hwp5,.doc,.docx" />
          <div id="fileName">선택된 파일 없음</div>
          <button id="imgToggle" onclick="toggleImg()">🖼️ 이미지 생성 프롬프트: OFF</button>
        </div>

        <div class="bottom-row">
          <input id="msgInput" type="text" placeholder="궁금한 것을 입력하세요..." onkeydown="if(event.key==='Enter') sendMsg()" />
          <button id="sendBtn" onclick="sendMsg()">전송</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ✅ 반드시 본인 Apps Script 웹앱 URL로 교체하세요!
    var API_URL = "https://script.google.com/macros/s/AKfycbxqGXIqqZDdvhMqekjlXouEQOexiUZGMidxSMGPzVd-Yc_fNEw7HNxzJVtWEb_2-h73/exec";

    var sid = localStorage.getItem("edubuddy_sid");
    if (!sid) {
      sid = "s" + Date.now() + Math.random().toString(36).substr(2, 8);
      localStorage.setItem("edubuddy_sid", sid);
    }

    const msgBox = document.getElementById("messages");
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const fileNameEl = document.getElementById("fileName");
    const imgToggleBtn = document.getElementById("imgToggle");

    let needImage = false;
    let currentFileText = "";
    let currentFileName = "";

    function jsonpRequest(params, timeoutMs) {
      timeoutMs = timeoutMs || 90000;
      return new Promise(function(resolve, reject) {
        var callbackName = "__edubuddy_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        params.callback = callbackName;

        var query = Object.keys(params).map(function(key) {
          return encodeURIComponent(key) + "=" + encodeURIComponent(params[key] == null ? "" : params[key]);
        }).join("&");

        var script = document.createElement("script");
        var timer = null;

        function cleanup() {
          if (timer) clearTimeout(timer);
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
          if (script && script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error(
            "Apps Script 웹앱에 접근할 수 없습니다. " +
            "배포 설정에서 '액세스: 누구나'로 되어 있는지 확인하세요."
          ));
        };

        timer = setTimeout(function() {
          cleanup();
          reject(new Error("요청 시간이 초과되었습니다."));
        }, timeoutMs);

        script.src = API_URL + "?" + query;
        document.body.appendChild(script);
      });
    }

    fileInput.addEventListener("change", async function(ev) {
      const f = ev.target.files && ev.target.files[0];
      if (!f) return;
      currentFileName = f.name;
      fileNameEl.textContent = "📄 " + f.name;
      try {
        const reader = new FileReader();
        reader.onload = function() {
          currentFileText = String(reader.result || "").slice(0, 500);
        };
        reader.onerror = function() {
          currentFileText = "";
          fileNameEl.textContent = "📄 " + f.name + " (읽기 실패)";
        };
        reader.readAsText(f);
      } catch (err) {
        currentFileText = "";
      }
    });

    function toggleImg() {
      needImage = !needImage;
      imgToggleBtn.textContent = "🖼️ 이미지 생성 프롬프트: " + (needImage ? "ON" : "OFF");
      imgToggleBtn.classList.toggle("active", needImage);
    }

    function ask(text) {
      msgInput.value = text;
      sendMsg();
    }

    function showTyping() {
      const id = "t" + Date.now();
      const div = document.createElement("div");
      div.className = "msg ai";
      div.id = id;
      div.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      msgBox.appendChild(div);
      msgBox.scrollTop = msgBox.scrollHeight;
      return id;
    }

    function hideTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function esc(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function md2html(text) {
      if (!text) return "";
      return String(text)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*)$/gm, "<h3>$1</h3>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\n/g, "<br/>");
    }

    function addMsg(html, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerHTML = '<div class="bubble">' + html + '</div>';
      msgBox.appendChild(div);
      msgBox.scrollTop = msgBox.scrollHeight;
    }

    function formatResponse(data) {
      let html = "";
      if (data.imageUrl) {
        html += '<div class="image-box"><img src="' + esc(data.imageUrl) + '" alt="관련 이미지" onerror="this.style.display=\'none\'"/><div class="image-caption">🖼️ ' + esc(data.analysis && data.analysis.field ? data.analysis.field : "") + ' 관련 이미지</div></div>';
      }
      html += md2html(data.response || "응답 없음");

      if (data.kmooc && data.kmooc.length > 0) {
        html += '<div style="margin-top:14px;"><h3>📚 추천 K-MOOC 강좌</h3></div>';
        data.kmooc.forEach(function(c) {
          html += '<div class="course-card">';
          html += '<h4>' + esc(c.name) + '</h4>';
          html += '<div class="meta">👨‍🏫 ' + esc(c.professor) + ' | 🏫 ' + esc(c.org) + '</div>';
          if (c.period) html += '<div class="meta">📅 ' + esc(c.period) + '</div>';
          html += '<a class="course-link" href="' + esc(c.url) + '" target="_blank" rel="noopener">🔗 강좌 바로가기</a>';
          html += '</div>';
        });
      } else {
        html += '<div class="no-data" style="margin-top:12px;">📚 K-MOOC 추천 강좌를 찾지 못했습니다.</div>';
        html += '<div class="no-data"><a href="https://www.kmooc.kr" target="_blank" rel="noopener">🔎 K-MOOC 바로가기</a></div>';
      }

      if (data.credit && data.credit.length > 0) {
        html += '<div style="margin-top:14px;"><h3>🎓 학점은행제 추천 과목</h3></div>';
        data.credit.forEach(function(c) {
          html += '<div class="credit-card">';
          html += '<h4>' + esc(c.subject) + '</h4>';
          html += '<div class="meta">🏢 ' + esc(c.org) + '</div>';
          html += '<a class="credit-link" href="https://www.cb.or.kr/creditbank/stdSrvcStd/nStudyPortal.do" target="_blank" rel="noopener">🔗 학점은행제 검색</a>';
          html += '</div>';
        });
      }

      return html;
    }

    function sendMsg() {
      const text = msgInput.value.trim();
      if (!text && !currentFileText) return;

      addMsg(esc(text || "(파일만 첨부)"), "user");
      msgInput.value = "";
      sendBtn.disabled = true;

      const typingId = showTyping();

      jsonpRequest({
        type: "chat",
        msg: text.slice(0, 700),
        sid: sid,
        file: String(currentFileText || "").slice(0, 500),
        fname: String(currentFileName || "").slice(0, 100),
        img: needImage ? "true" : "false"
      }, 120000)
        .then(function(data) {
          hideTyping(typingId);
          if (data.status === "success") {
            addMsg(formatResponse(data.data), "ai");
          } else {
            addMsg('<div class="error-box">❌ ' + esc(data.message || "알 수 없는 오류") + '</div>', "ai");
          }
        })
        .catch(function(err) {
          hideTyping(typingId);
          addMsg('<div class="error-box">❌ ' + esc(err.message || String(err)) + '</div>', "ai");
        })
        .finally(function() {
          sendBtn.disabled = false;
          currentFileText = "";
          currentFileName = "";
          fileInput.value = "";
          fileNameEl.textContent = "선택된 파일 없음";
          needImage = false;
          imgToggleBtn.textContent = "🖼️ 이미지 생성 프롬프트: OFF";
          imgToggleBtn.classList.remove("active");
          msgInput.focus();
        });
    }

    function clearChat() {
      jsonpRequest({ type: "clear", sid: sid }, 20000)
        .then(function() {
          msgBox.innerHTML = "";
          addMsg("대화가 초기화되었습니다! 😊", "ai");
        })
        .catch(function() {
          msgBox.innerHTML = "";
          addMsg("대화 초기화 중 오류가 발생했습니다.", "ai");
        });
    }

    window.onload = function() {
      jsonpRequest({ type: "ping" }, 20000)
        .then(function(d) {
          console.log("✅ 연결 성공:", d);
        })
        .catch(function(e) {
          console.error("❌ 연결 실패:", e);
          addMsg('<div class="error-box">⚠️ 서버 연결 실패. Apps Script 배포 설정을 확인하세요.<br/>' + esc(e.message || "") + '</div>', "ai");
        });
    };
  </script>
</body>
</html>
